<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Keeps this page OUT of Google so it stays private/hidden. Don't remove this line! -->
  <meta name="robots" content="noindex, nofollow" />

  <title>Oliver's Birthday Bash!</title>

  <style>
    /* ===== COLORS & BACKGROUND ===== */
    :root {
      --color-1: #7C3AED;  /* purple */
      --color-2: #EC4899;  /* pink */
      --color-3: #F59E0B;  /* orange */
      --text:    #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      text-align: center;
      overflow: hidden;            /* keep the game full-screen, no scrollbars */
      background: linear-gradient(-45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-1));
      background-size: 400% 400%;
      animation: party-bg 12s ease infinite;
      padding: 30px 16px 60px;
    }
    @keyframes party-bg {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== THE GAME CANVAS (draws on top, but lets clicks pass through) ===== */
    #game {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    /* ===== PAGE CONTENT (sits under the game) ===== */
    .content { position: relative; z-index: 2; }

    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem);
      margin-top: 20px;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .subtitle {
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      margin: 14px 0 30px;
      opacity: 0.95;
    }

    /* ===== INFO CARDS (When / Where / Bring) ===== */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 24px;
      width: 250px;
      backdrop-filter: blur(4px);
    }
    .card .emoji { font-size: 3rem; }
    .card h2 { font-size: 1.4rem; margin: 10px 0 8px; }
    .card p { font-size: 1.05rem; line-height: 1.4; }

    #hint {
      margin-top: 26px;
      font-size: 1.05rem;
      opacity: 0.95;
    }

    footer { margin-top: 20px; font-size: 1rem; opacity: 0.9; }

    /* the "balloons popped" score badge */
    #pop-counter {
      position: fixed;
      top: 12px;
      right: 14px;
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.5);
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 1rem;
      z-index: 10;
    }

    /* on-screen buttons so the game works on phones & tablets too */
    #touch-controls {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 16px;
      z-index: 9;
      pointer-events: none;      /* only the buttons themselves are tappable */
    }
    #touch-controls .group { display: flex; gap: 12px; }
    .tc-btn {
      pointer-events: auto;
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 1.8rem;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .tc-btn:active { background: rgba(255,255,255,0.45); }
    #tc-fire { width: 84px; height: 84px; font-size: 1.1rem; font-weight: bold; }
  </style>
</head>

<body>

  <!-- the spaceship game is drawn here -->
  <canvas id="game"></canvas>

  <!-- score badge: counts how many balloons you've popped -->
  <div id="pop-counter">🎈 Popped: 0</div>

  <!-- ===== PARTY INFO ===== -->
  <div class="content">
    <h1>🎉 Oliver's Birthday Bash! 🎉</h1>
    <p class="subtitle">You're invited to the best party ever!</p>

    <div class="cards">
      <div class="card">
        <div class="emoji">📅</div>
        <h2>When</h2>
        <p>July 7th</p>
      </div>

      <div class="card">
        <div class="emoji">📍</div>
        <h2>Where</h2>
        <p>Fly High<br/>Trampoline Park</p>
      </div>

      <div class="card">
        <div class="emoji">🎁</div>
        <h2>Bring</h2>
        <p>Presents! 🎁</p>
      </div>
    </div>

    <p id="hint">🚀 Fly with the <b>arrow keys</b> or the buttons below · <b>Space</b> or <b>FIRE</b> to shoot the balloons!</p>

    <footer>Can't wait to see you there! 🥳</footer>
  </div>

  <!-- tap buttons for phones/tablets (they also work with a mouse) -->
  <div id="touch-controls">
    <div class="group">
      <div class="tc-btn" id="tc-left">◀</div>
      <div class="tc-btn" id="tc-thrust">🔥</div>
      <div class="tc-btn" id="tc-right">▶</div>
    </div>
    <div class="group">
      <div class="tc-btn" id="tc-fire">FIRE</div>
    </div>
  </div>

  <!-- ===== THE SPACESHIP GAME ===== -->
  <script>
  (function () {
    const canvas  = document.getElementById('game');
    const ctx     = canvas.getContext('2d');
    const counter = document.getElementById('pop-counter');

    // ----- make the canvas fill the screen (and stay crisp) -----
    let W = 0, H = 0;
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ----- keyboard -----
    const keys = {};
    const GAME_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '];
    window.addEventListener('keydown', function (e) {
      if (GAME_KEYS.indexOf(e.key) !== -1) e.preventDefault();   // don't scroll the page
      keys[e.key] = true;
      // start the sound (browsers only allow audio after a key/tap)
      if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });
    window.addEventListener('keyup', function (e) { keys[e.key] = false; });

    // ----- sounds -----
    let audioCtx = null;
    function beep(type, fromHz, toHz, vol, dur) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(fromHz, t);
      osc.frequency.exponentialRampToValueAtTime(toHz, t + dur);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.02);
      osc.start(t);
      osc.stop(t + dur + 0.03);
    }
    function playPop()   { beep('triangle', 420, 70, 0.25, 0.13); }
    function playShoot() { beep('square',   700, 200, 0.07, 0.08); }

    // ----- the spaceship -----
    const ship = { x: W / 2, y: H / 2, angle: -Math.PI / 2, vx: 0, vy: 0, r: 16 };

    // ----- bullets -----
    const bullets = [];
    let shootCooldown = 0;

    // ----- balloons (the targets) -----
    const COLORS = ['#ff5d8f', '#ffd23f', '#3bceac', '#5d9bff', '#c77dff', '#ff924c'];
    const balloons = [];
    function spawnBalloon() {
      const r = 18 + Math.random() * 14;
      balloons.push({
        x: r + Math.random() * (W - 2 * r),
        y: H + r + Math.random() * 80,
        r: r,
        vx: (Math.random() - 0.5) * 20,
        vy: -(25 + Math.random() * 35),
        sway: Math.random() * Math.PI * 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
    for (let i = 0; i < 7; i++) spawnBalloon();

    // ----- pop burst particles -----
    const particles = [];
    function burst(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 40 + Math.random() * 130;
        particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.5, color: color });
      }
    }

    let score = 0;

    // wrap things around the screen edges (classic Asteroids style)
    function wrap(o) {
      if (o.x < 0) o.x += W;
      if (o.x > W) o.x -= W;
      if (o.y < 0) o.y += H;
      if (o.y > H) o.y -= H;
    }

    // ----- the game loop -----
    let last = 0;
    function loop(ts) {
      const dt = Math.min(0.05, last ? (ts - last) / 1000 : 0);
      last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      // turn the ship
      if (keys['ArrowLeft'])  ship.angle -= 3.5 * dt;
      if (keys['ArrowRight']) ship.angle += 3.5 * dt;
      // thrust forward
      if (keys['ArrowUp']) {
        ship.vx += Math.cos(ship.angle) * 260 * dt;
        ship.vy += Math.sin(ship.angle) * 260 * dt;
      }
      ship.vx *= 0.99;  // a little drag so you can slow down
      ship.vy *= 0.99;
      ship.x += ship.vx * dt;
      ship.y += ship.vy * dt;
      wrap(ship);

      // shoot
      shootCooldown -= dt;
      if (keys[' '] && shootCooldown <= 0) {
        bullets.push({
          x: ship.x + Math.cos(ship.angle) * ship.r,
          y: ship.y + Math.sin(ship.angle) * ship.r,
          vx: Math.cos(ship.angle) * 430 + ship.vx,
          vy: Math.sin(ship.angle) * 430 + ship.vy,
          life: 1.2
        });
        playShoot();
        shootCooldown = 0.22;
      }

      // move bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
        wrap(b);
        if (b.life <= 0) bullets.splice(i, 1);
      }

      // float balloons up
      for (let i = balloons.length - 1; i >= 0; i--) {
        const bl = balloons[i];
        bl.sway += dt * 2;
        bl.x += (bl.vx + Math.sin(bl.sway) * 12) * dt;
        bl.y += bl.vy * dt;
        if (bl.y < -bl.r - 10) { balloons.splice(i, 1); spawnBalloon(); }
      }

      // did a bullet hit a balloon?
      for (let i = balloons.length - 1; i >= 0; i--) {
        const bl = balloons[i];
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const dx = b.x - bl.x, dy = b.y - bl.y;
          if (dx * dx + dy * dy < bl.r * bl.r) {
            burst(bl.x, bl.y, bl.color);
            playPop();
            balloons.splice(i, 1);
            bullets.splice(j, 1);
            score++;
            if (counter) counter.textContent = '🎈 Popped: ' + score;
            spawnBalloon();
            break;
          }
        }
      }

      // fade the pop particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.92; p.vy *= 0.92;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // balloons
      for (const bl of balloons) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(bl.x, bl.y + bl.r);
        ctx.lineTo(bl.x, bl.y + bl.r + 14);
        ctx.stroke();

        ctx.fillStyle = bl.color;
        ctx.beginPath();
        ctx.ellipse(bl.x, bl.y, bl.r * 0.85, bl.r, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.ellipse(bl.x - bl.r * 0.3, bl.y - bl.r * 0.35, bl.r * 0.18, bl.r * 0.28, -0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // bullets
      ctx.fillStyle = '#ffffff';
      for (const b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // pop particles
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life * 2);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // the ship (a triangle pointing where it's headed)
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);

      // thruster flame when you press Up
      if (keys['ArrowUp']) {
        ctx.fillStyle = '#ffd23f';
        ctx.beginPath();
        ctx.moveTo(-ship.r * 0.5, -5);
        ctx.lineTo(-ship.r * 1.4, 0);
        ctx.lineTo(-ship.r * 0.5, 5);
        ctx.closePath();
        ctx.fill();
      }

      ctx.strokeStyle = '#ffffff';
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(ship.r, 0);
      ctx.lineTo(-ship.r * 0.8, -ship.r * 0.7);
      ctx.lineTo(-ship.r * 0.5, 0);
      ctx.lineTo(-ship.r * 0.8, ship.r * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    // ----- on-screen buttons (work with touch AND mouse) -----
    function bindButton(id, key) {
      const el = document.getElementById(id);
      if (!el) return;
      function press(e) {
        e.preventDefault();
        keys[key] = true;
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }
      function release(e) { if (e) e.preventDefault(); keys[key] = false; }
      el.addEventListener('touchstart', press, { passive: false });
      el.addEventListener('touchend', release);
      el.addEventListener('touchcancel', release);
      el.addEventListener('mousedown', press);
      el.addEventListener('mouseup', release);
      el.addEventListener('mouseleave', release);
    }
    bindButton('tc-left',   'ArrowLeft');
    bindButton('tc-right',  'ArrowRight');
    bindButton('tc-thrust', 'ArrowUp');
    bindButton('tc-fire',   ' ');

    requestAnimationFrame(loop);
  })();
  </script>

</body>
</html>
