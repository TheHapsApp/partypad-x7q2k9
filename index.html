<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Keeps this page OUT of Google so it stays private/hidden. Don't remove this line! -->
  <meta name="robots" content="noindex, nofollow" />

  <title>Oliver's Birthday Bash!</title>

  <style>
    /* ===== COLORS & BACKGROUND =====
       Want different party colors? Change these. */
    :root {
      --color-1: #7C3AED;  /* purple */
      --color-2: #EC4899;  /* pink */
      --color-3: #F59E0B;  /* orange */
      --text:    #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      text-align: center;
      overflow-x: hidden;
      /* moving rainbow party background */
      background: linear-gradient(-45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-1));
      background-size: 400% 400%;
      animation: party-bg 12s ease infinite;
      padding: 30px 16px 60px;
    }
    @keyframes party-bg {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== THE BIG TITLE ===== */
    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem);
      margin-top: 20px;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .subtitle {
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      margin: 14px 0 30px;
      opacity: 0.95;
    }

    /* ===== INFO CARDS (When / Where / Bring) ===== */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 24px;
      width: 250px;
      backdrop-filter: blur(4px);
    }
    .card .emoji { font-size: 3rem; }
    .card h2 { font-size: 1.4rem; margin: 10px 0 8px; }
    .card p { font-size: 1.05rem; line-height: 1.4; }

    /* ===== FLOATING BALLOONS (tap to pop!) ===== */
    .balloon {
      position: fixed;
      bottom: -100px;
      font-size: 2.5rem;
      animation: float-up 9s linear infinite;
      z-index: 5;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    /* when a balloon is popped: freeze it in place and fade it out */
    .balloon.popped {
      animation-play-state: paused;
      opacity: 0;
      transition: opacity 0.3s ease-out;
      cursor: default;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-115vh) rotate(20deg); }
    }

    /* the "balloons popped" score badge */
    #pop-counter {
      position: fixed;
      top: 12px;
      right: 14px;
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.5);
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 1rem;
      z-index: 10;
    }

    footer { margin-top: 50px; font-size: 1rem; opacity: 0.9; }
  </style>
</head>

<body>

  <!-- score badge: counts how many balloons you've popped -->
  <div id="pop-counter">🎈 Popped: 0</div>

  <!-- floating balloons — tap one to pop it! -->
  <span class="balloon" style="left:10%; animation-delay:0s;">🎈</span>
  <span class="balloon" style="left:30%; animation-delay:3s;">🎈</span>
  <span class="balloon" style="left:55%; animation-delay:1.5s;">🎈</span>
  <span class="balloon" style="left:75%; animation-delay:5s;">🎈</span>
  <span class="balloon" style="left:90%; animation-delay:2s;">🎈</span>

  <!-- ===== EDIT YOUR PARTY INFO BELOW ===== -->

  <h1>🎉 Oliver's Birthday Bash! 🎉</h1>
  <p class="subtitle">You're invited to the best party ever!</p>

  <div class="cards">
    <div class="card">
      <div class="emoji">📅</div>
      <h2>When</h2>
      <p>July 7th</p>
    </div>

    <div class="card">
      <div class="emoji">📍</div>
      <h2>Where</h2>
      <p>Fly High<br/>Trampoline Park</p>
    </div>

    <div class="card">
      <div class="emoji">🎁</div>
      <h2>Bring</h2>
      <p>Presents! 🎁</p>
    </div>
  </div>

  <footer>Can't wait to see you there! 🥳</footer>

  <!-- ===== POP THE BALLOONS! ===== -->
  <script>
    let popCount = 0;
    const counter = document.getElementById('pop-counter');

    // a tiny "pop" sound made with the Web Audio API
    // (allowed because a tap/click is what triggers it)
    function playPop() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(420, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.16);
      } catch (e) { /* if sound isn't allowed, the pop still works */ }
    }

    // pop one balloon: show a 💥, play the sound, add to the score,
    // then remove it and float a fresh balloon up to replace it
    function popBalloon(balloon) {
      if (balloon.classList.contains('popped')) return;
      balloon.classList.add('popped');
      balloon.textContent = '💥';
      playPop();
      popCount++;
      if (counter) counter.textContent = '🎈 Popped: ' + popCount;
      setTimeout(function () {
        balloon.remove();
        spawnBalloon();
      }, 300);
    }

    // create a brand-new balloon at a random spot
    function spawnBalloon() {
      const b = document.createElement('span');
      b.className = 'balloon';
      b.textContent = '🎈';
      b.style.left = Math.floor(Math.random() * 88 + 4) + '%';
      b.style.animationDuration = (7 + Math.random() * 4).toFixed(1) + 's';
      b.addEventListener('click', function () { popBalloon(b); });
      document.body.appendChild(b);
    }

    // make the balloons that are already on the page poppable
    document.querySelectorAll('.balloon').forEach(function (b) {
      b.addEventListener('click', function () { popBalloon(b); });
    });
  </script>

</body>
</html>
